# GAPT dev stack — single-node, no Sysbox (per-project sandbox containers
# come later via M1-E1 SandboxBackend). This compose boots the *control
# plane* dependencies + a hello-world server/web so a developer can verify
# the toolchain end-to-end on PR1.
#
# Real production wiring (Caddy on-demand TLS, SeaweedFS replication,
# Postgres HA) lands in M1-E1 / M1-E4 / M4-E2.

name: gapt-dev

services:
  # ---------- data plane ----------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gapt
      POSTGRES_PASSWORD: gapt_dev_only
      POSTGRES_DB: gapt
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gapt -d gapt"]
      interval: 5s
      timeout: 3s
      retries: 12
    ports:
      - "127.0.0.1:35432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    ports:
      - "127.0.0.1:36379:6379"

  # SeaweedFS — persistent file core. host FS는 cache only.
  # Single binary serves master + volume + filer + s3 in dev.
  seaweedfs:
    image: chrislusf/seaweedfs:3.99
    restart: unless-stopped
    command:
      - server
      - -dir=/data
      - -master.volumeSizeLimitMB=128
      - -volume.max=0
      - -filer
      - -filer.maxMB=64
      - -s3
      - -s3.config=/config/s3.json
    volumes:
      - seaweed-data:/data
      - ./seaweed/s3.json:/config/s3.json:ro
    healthcheck:
      # /cluster/healthz returns 200 when master+volume+filer are up.
      # Explicit 127.0.0.1 avoids BusyBox wget resolving localhost to
      # [::1] (SeaweedFS only binds IPv4).
      test:
        - CMD-SHELL
        - "wget --no-verbose --tries=1 --spider http://127.0.0.1:9333/cluster/healthz || exit 1"
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:39333:9333" # master
      - "127.0.0.1:38888:8888" # filer http
      - "127.0.0.1:38333:8333" # s3
      # volume :8080 is internal-only — master proxies all reads/writes,
      # and exposing it would collide with caddy on the host.

  # ---------- control plane ----------
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    environment:
      GAPT_ENV: dev
      GAPT_LOG_FORMAT: console
      GAPT_PORT: "8088"
      GAPT_POSTGRES_DSN: postgresql+psycopg://gapt:gapt_dev_only@postgres:5432/gapt
      GAPT_REDIS_DSN: redis://redis:6379/0
      GAPT_SEAWEED_FILER_URL: http://seaweedfs:8888
      GAPT_SEAWEED_S3_ENDPOINT: http://seaweedfs:8333
      GAPT_SEAWEED_S3_ACCESS_KEY: gapt-dev
      GAPT_SEAWEED_S3_SECRET_KEY: gapt-dev-secret
      GAPT_SEAWEED_BUCKET: gapt
      GAPT_SESSION_SECRET: dev-only-session-secret
      GAPT_DAEMON_JWT_SECRET: dev-only-daemon-secret
    healthcheck:
      test:
        - CMD-SHELL
        - 'python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(''http://localhost:8088/health'').status==200 else 1)"'
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:38088:8088"

  # ---------- edge ----------
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    # On plain Linux Docker (no Docker Desktop) `host.docker.internal`
    # doesn't auto-resolve. This shim points it at the host's docker
    # bridge gateway so the IDE-fallback handle in Caddyfile.dev can
    # reach vite (running on the host at :35173) without us hardcoding
    # an IP. Docker Desktop on Mac/Windows ignores this — the name is
    # already a built-in there.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      # GAPT port convention: 3xxxx prefix for all infra surfaces so
      # workspace dev servers (3000/5173/etc.) never clash. The host
      # cloudflared tunnel points `gapt.hrletsgo.me` at 127.0.0.1:38080.
      - "127.0.0.1:38080:8080" # main edge — IDE + /api + /preview/*
      - "127.0.0.1:32019:2019" # admin API (server mutates routes here)
    networks:
      # `default` is the compose-internal network (Postgres/Redis/server
      # talk over it). `gapt-net` is the SHARED network workspace
      # sandbox containers join — Caddy must be on both so it can
      # reverse-proxy `gapt-ws-<wid>:<port>` for the preview server
      # while still hitting `server:8088` for the API.
      - default
      - gapt-net
    # No 443 in dev — TLS happens at host level on the real domain.

  # ---------- observability (optional `metrics` profile) ----------
  prometheus:
    profiles: ["metrics"]
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:39090:9090"

  grafana:
    profiles: ["metrics"]
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: gapt-dev
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:33000:3000"

volumes:
  postgres-data:
  redis-data:
  seaweed-data:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: gapt-dev
  # `gapt-net` is the shared bridge every workspace sandbox container
  # (`gapt-ws-<wid>`) joins at startup. The server (running on the
  # host) creates it lazily via `docker network create gapt-net` on
  # the first workspace boot, so we mark it `external: true` here —
  # compose won't try to create or own it.
  gapt-net:
    external: true
    name: gapt-net
