# Cloudflare tunnel config for the GAPT tunnel deployment.
#
# Copy to `config.yml` (same directory) and drop the tunnel's
# credentials JSON beside it, then bring up the `tunnel` profile:
#   docker compose -f docker-compose.tunnel.yml --profile tunnel up -d
#
# The compose mounts this directory at /etc/cloudflared, so the
# `credentials-file` path below is the in-container path. Both
# config.yml and the *.json credentials file are gitignored — the
# JSON is the tunnel secret and must never be committed.
#
# Reference the tunnel by its UUID, not its name: a name requires the
# account `cert.pem` (from `cloudflared tunnel login`) to resolve,
# which a fresh box doesn't have. The UUID + credentials-file is
# self-contained.
#
# NOTE: if the tunnel is REMOTELY managed (its ingress configured in
# the Cloudflare Zero Trust dashboard), cloudflared uses that remote
# config and IGNORES the `ingress:` below — only `tunnel:` and
# `credentials-file:` are honoured. In that case the docker-compose
# cloudflared service runs with `network_mode: host` so the dashboard's
# `http://localhost:38080` origin reaches Caddy's published port. For a
# LOCALLY managed tunnel the ingress below dials `caddy:8080` over the
# compose network instead.

tunnel: <TUNNEL_ID>
credentials-file: /etc/cloudflared/<TUNNEL_ID>.json

ingress:
  # Apex: GAPT IDE + /api + /preview/<slug>/* (path-based preview).
  - hostname: gapt.hrletsgo.me
    service: http://caddy:8080
    originRequest:
      noTLSVerify: true
  # Wildcard for per-deploy subdomains (subdomain preview mode).
  - hostname: '*.gapt.hrletsgo.me'
    service: http://caddy:8080
    originRequest:
      noTLSVerify: true
  - service: http_status:404
