# GAPT prod stack — single-VPS self-host.
#
# This file is the canonical production template. Override secrets +
# domains via a sibling `.env` (compose auto-loads it) or by setting
# env vars in the calling shell. The compose file itself never
# hard-codes credentials.
#
# Required env vars (see docs/operations/install.md for the full list):
#   GAPT_DOMAIN              — apex domain (e.g. gapt.example.com)
#   GAPT_PREVIEW_DOMAIN      — wildcard (e.g. preview.gapt.example.com)
#   GAPT_POSTGRES_PASSWORD   — random ≥ 32 chars
#   GAPT_SESSION_SECRET      — random ≥ 32 chars
#   GAPT_DAEMON_JWT_SECRET   — random ≥ 32 chars
#   GAPT_VAULT_MASTER_KEY    — random ≥ 32 chars (NEVER rotate without a re-encrypt migration)
#   GAPT_SHARE_LINK_SECRET   — random ≥ 32 chars
#   ACME_EMAIL               — for Let's Encrypt registration
#
# Optional:
#   GAPT_SLACK_WEBHOOK_URL   — wire deploy notifications to Slack
#   GAPT_DISCORD_WEBHOOK_URL — same for Discord
#   GAPT_CI_GITHUB_TOKEN     — server-wide GitHub PAT for /_gapt/api/projects/.../ci/runs
#
# Profiles:
#   default  — postgres / redis / seaweedfs / server / caddy
#   metrics  — adds prometheus + grafana (scrape /metrics)
#
# Bring up: `docker compose -f docker-compose.prod.yml --profile metrics up -d`

name: gapt-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gapt
      POSTGRES_PASSWORD: ${GAPT_POSTGRES_PASSWORD:?GAPT_POSTGRES_PASSWORD required}
      POSTGRES_DB: gapt
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gapt -d gapt"]
      interval: 5s
      timeout: 3s
      retries: 20
    # No host port — Postgres reachable only via the gapt-prod network.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  seaweedfs:
    image: chrislusf/seaweedfs:3.99
    restart: unless-stopped
    command:
      - server
      - -dir=/data
      - -master.volumeSizeLimitMB=512
      - -volume.max=0
      - -filer
      - -filer.maxMB=128
      - -s3
      - -s3.config=/config/s3.json
    volumes:
      - seaweed-data:/data
      - ./seaweed/s3.json:/config/s3.json:ro
    healthcheck:
      test:
        - CMD-SHELL
        - "wget --no-verbose --tries=1 --spider http://127.0.0.1:9333/cluster/healthz || exit 1"
      interval: 10s
      timeout: 5s
      retries: 30

  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      caddy:
        # The Caddy admin API needs to be reachable for the preview
        # subdomain feature — depends on caddy being up, not healthy
        # (Caddy starts without a server config).
        condition: service_started
    environment:
      GAPT_ENV: prod
      GAPT_LOG_FORMAT: json
      GAPT_PORT: "8088"
      GAPT_POSTGRES_DSN: postgresql+psycopg://gapt:${GAPT_POSTGRES_PASSWORD}@postgres:5432/gapt
      GAPT_REDIS_DSN: redis://redis:6379/0
      GAPT_SEAWEED_FILER_URL: http://seaweedfs:8888
      GAPT_SEAWEED_S3_ENDPOINT: http://seaweedfs:8333
      GAPT_SEAWEED_S3_ACCESS_KEY: ${GAPT_SEAWEED_ACCESS_KEY:-gapt}
      GAPT_SEAWEED_S3_SECRET_KEY: ${GAPT_SEAWEED_SECRET_KEY:?GAPT_SEAWEED_SECRET_KEY required}
      GAPT_SEAWEED_BUCKET: gapt
      GAPT_SESSION_SECRET: ${GAPT_SESSION_SECRET:?GAPT_SESSION_SECRET required}
      GAPT_DAEMON_JWT_SECRET: ${GAPT_DAEMON_JWT_SECRET:?GAPT_DAEMON_JWT_SECRET required}
      GAPT_VAULT_MASTER_KEY: ${GAPT_VAULT_MASTER_KEY:?GAPT_VAULT_MASTER_KEY required}
      GAPT_CADDY_ADMIN_URL: http://caddy:2019
      GAPT_CADDY_PREVIEW_DOMAIN: ${GAPT_PREVIEW_DOMAIN:?GAPT_PREVIEW_DOMAIN required}
      GAPT_SHARE_LINK_SECRET: ${GAPT_SHARE_LINK_SECRET:?GAPT_SHARE_LINK_SECRET required}
      GAPT_SLACK_WEBHOOK_URL: ${GAPT_SLACK_WEBHOOK_URL:-}
      GAPT_DISCORD_WEBHOOK_URL: ${GAPT_DISCORD_WEBHOOK_URL:-}
      GAPT_CI_GITHUB_TOKEN: ${GAPT_CI_GITHUB_TOKEN:-}
      GAPT_POLICY_CONFIG_PATH: ${GAPT_POLICY_CONFIG_PATH:-}
    volumes:
      # The encrypted local vault stays on a named volume so secret
      # ciphertext survives container recreate. Plaintext is never
      # written to disk; only the Fernet ciphertext lives here.
      - vault-data:/var/lib/gapt
    healthcheck:
      test:
        - CMD-SHELL
        - 'python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(''http://localhost:8088/health'').status==200 else 1)"'
      interval: 10s
      timeout: 5s
      retries: 20

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      GAPT_DOMAIN: ${GAPT_DOMAIN:?GAPT_DOMAIN required}
      GAPT_PREVIEW_DOMAIN: ${GAPT_PREVIEW_DOMAIN:?GAPT_PREVIEW_DOMAIN required}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL required}
    volumes:
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
    # No admin port published — only the gapt-prod network reaches :2019.

  prometheus:
    profiles: ["metrics"]
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    # No host port — Grafana reads it inside the network.

  grafana:
    profiles: ["metrics"]
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD required when metrics profile is enabled}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    # Reachable behind Caddy on the operator's choice of path/subdomain.
    # Not exposed directly on the host.

volumes:
  postgres-data:
  redis-data:
  seaweed-data:
  caddy-data:
  caddy-config:
  vault-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: gapt-prod
